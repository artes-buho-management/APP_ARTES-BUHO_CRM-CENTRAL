<style>
  :root {
    --color-yellow: #ffd23f;
    --color-red: #d62828;
    --color-red-dark: #9f1f1f;
    --color-white: #ffffff;
    --color-ink: #1f1f1f;
    --color-muted: #4b4b4b;
    --color-line: #e8d8d8;
    --color-bg-soft: #fff7ec;
    --color-bg-gradient: linear-gradient(130deg, #fff7ec 0%, #ffffff 48%, #ffe8e8 100%);
    --radius: 14px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    color: var(--color-ink);
    font-family: "Trebuchet MS", "Gill Sans", "Franklin Gothic Medium", sans-serif;
    background: var(--color-bg-gradient);
  }

  .page {
    max-width: 1220px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    gap: 16px;
  }

  .hero {
    border: 1px solid #f5c7c7;
    background: var(--color-white);
    border-radius: var(--radius);
    padding: 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
    box-shadow: 0 10px 20px rgba(214, 40, 40, 0.08);
  }

  .hero-logo {
    width: 88px;
    height: 88px;
    border-radius: 18px;
    border: 1px solid #ffd9d9;
    background: #fff6f6;
    display: grid;
    place-items: center;
  }

  .brand-logo {
    width: 72px;
    height: 72px;
    object-fit: contain;
    display: block;
  }

  .hero-copy h1 {
    margin: 0;
    color: var(--color-red);
    font-size: 30px;
    letter-spacing: 0.03em;
  }

  .hero-subtitle {
    margin: 4px 0 0;
    font-size: 17px;
    font-weight: 700;
    color: #353535;
  }

  .hero-meta {
    margin: 6px 0 0;
    font-size: 13px;
    font-weight: 700;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .hero-badges {
    display: grid;
    gap: 8px;
    justify-items: end;
  }

  .badge {
    display: inline-block;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    background: #fff1f1;
    border: 1px solid #ffd1d1;
    color: #8b1d1d;
  }

  .badge.good {
    background: #fff8de;
    border-color: #ffd23f;
    color: #7a5700;
  }

  .card {
    background: var(--color-white);
    border: 1px solid var(--color-line);
    border-radius: var(--radius);
    padding: 14px;
  }

  .card-main {
    border: 2px solid #f7d95a;
    box-shadow: 0 8px 18px rgba(214, 40, 40, 0.08);
  }

  .card h2 {
    margin: 2px 0 12px;
    font-size: 17px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-red);
  }

  form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    align-items: end;
  }

  label {
    display: grid;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: #444;
    text-transform: uppercase;
  }

  .full-width {
    grid-column: 1 / -1;
  }

  input,
  button {
    width: 100%;
    border-radius: 10px;
    font: inherit;
    border: 1px solid #efcaca;
    padding: 10px 11px;
    min-height: 42px;
  }

  input {
    background: #fffdfd;
    color: #222;
  }

  input:focus {
    border-color: var(--color-red);
    outline: 2px solid #ffdcdc;
  }

  input[readonly] {
    background: #f7f7f7;
    color: #666;
  }

  button {
    border: none;
    cursor: pointer;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, var(--color-red) 0%, #f25d2f 100%);
    transition: transform 120ms ease, box-shadow 120ms ease;
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 12px rgba(214, 40, 40, 0.22);
  }

  button.secondary {
    background: linear-gradient(135deg, #d39a00 0%, #f0c233 100%);
  }

  .checkbox {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 4px;
  }

  .checkbox input {
    width: 20px;
    height: 20px;
    min-height: 20px;
    margin: 0;
  }

  .status {
    margin: 10px 0 0;
    font-weight: 800;
    color: #761919;
    letter-spacing: 0.02em;
  }

  .status.error {
    color: #a01b1b;
  }

  .status-note {
    margin: 6px 0 0;
    font-size: 12px;
    color: #6f6f6f;
    font-weight: 700;
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 980px;
    background: #fff;
  }

  th,
  td {
    border: 1px solid #f2d6d6;
    padding: 8px 10px;
    font-size: 12px;
    text-align: left;
    vertical-align: top;
  }

  th {
    background: linear-gradient(180deg, #ffe8e8 0%, #fff3da 100%);
    font-size: 11px;
    font-weight: 800;
    color: #6d1f1f;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  tr.selected-row {
    background: #fff5d6;
  }

  .score-chip {
    display: inline-flex;
    min-width: 52px;
    justify-content: center;
    align-items: center;
    padding: 4px 8px;
    border-radius: 999px;
    font-weight: 800;
    background: #fff2bf;
    color: #6e4c00;
    border: 1px solid #f2d17a;
  }

  .footer {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    align-items: center;
    padding: 10px;
    border-radius: 10px;
    border: 1px dashed #e6b5b5;
    font-size: 12px;
    font-weight: 800;
    color: #6f2525;
    background: #fff9e9;
    letter-spacing: 0.02em;
  }

  @media (max-width: 900px) {
    .hero {
      grid-template-columns: 1fr;
      justify-items: start;
    }

    .hero-badges {
      justify-items: start;
      grid-auto-flow: column;
    }

    .hero-copy h1 {
      font-size: 24px;
    }
  }

  @media (max-width: 640px) {
    .page {
      padding: 12px;
    }

    .hero {
      padding: 12px;
    }

    .hero-logo {
      width: 72px;
      height: 72px;
    }

    .brand-logo {
      width: 58px;
      height: 58px;
    }
  }
</style>
